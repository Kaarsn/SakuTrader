version: '3.9'
services:
  analytics:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./analytics-python:/app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ./backend-node:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - ANALYTICS_SERVICE_URL=http://analytics:8000
      - PORT=4000
    env_file:
      - .env.example
    ports:
      - "4000:4000"
    depends_on:
      - analytics

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend-next:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend
